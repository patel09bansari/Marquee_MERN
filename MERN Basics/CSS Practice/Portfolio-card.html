<!DOCTYPE html>
<html>
<head>
    <title>Profile Card</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="portfolio-card.css">
</head>
<body>

<div class="card">

    <div class="header"></div>

    <img src="profile.avif"
         class="profile">

    <h2>CodingLab</h2>

    <p>YouTuber & Blogger</p>

    <div class="icons">
        <a href="#"><i class="fa-brands fa-facebook"></i></a>
        <a href="#"><i class="fa-brands fa-twitter"></i></a>
        <a href="#"><i class="fa-brands fa-instagram"></i></a>
        <a href="#"><i class="fa-brands fa-youtube"></i></a>
    </div>

    <button>Subscribe</button>
    <button>Message</button>

    <div class="footer">
    <span><i class="fa-regular fa-heart"></i> 60.4k</span>
    <span><i class="fa-regular fa-comment"></i> 20k</span>
    <span><i class="fa-solid fa-share"></i> 12.4k</span>
</div>
</div>

</body>
</html>
